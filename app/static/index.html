<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day0 Trainer</title>
<style>
  :root{
    --bg:#0e0d12; --panel:#16141d; --panel-2:#1d1a27; --line:#2b2738;
    --text:#ece9f4; --muted:#8d87a0; --accent:#a78bfa; --accent-strong:#8b6cf6;
    --ok:#9d8ef0; --err:#f07178; --on-accent:#17102e;
    --mono:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  [data-theme="light"]{
    --bg:#f7f6fb; --panel:#ffffff; --panel-2:#f1eef9; --line:#e0dcee;
    --text:#1d1a27; --muted:#6f6a83; --accent:#7c6cf0; --accent-strong:#6a58e8;
    --ok:#6a58e8; --err:#d4494f; --on-accent:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
  a{color:var(--accent)}
  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:14px}
  .brand{font-family:var(--mono);line-height:1.15}
  .brand .day0{font-size:24px;font-weight:700;letter-spacing:2px}
  .brand .day0 em{color:var(--accent);font-style:normal}
  .brand small{color:var(--muted);display:block;margin-top:2px}
  nav{display:flex;flex-direction:column;gap:4px}
  nav button{text-align:left}
  button{font-family:var(--sans);font-size:13px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  button.primary{background:var(--accent-strong);border-color:var(--accent-strong);color:var(--on-accent);font-weight:600}
  button.primary:hover{filter:brightness(1.06)}
  button.danger{border-color:var(--err);color:var(--err);background:transparent}
  button.small{padding:4px 9px;font-size:12px}
  button.active{border-color:var(--accent);color:var(--accent)}
  .joblist{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
  .jobitem{padding:8px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11.5px}
  .jobitem:hover,.jobitem.active{border-color:var(--accent);background:var(--panel-2)}
  .st{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .st.running{color:var(--accent)} .st.finished{color:var(--text)}
  .st.failed,.st.stopped{color:var(--err)} .st.unknown,.st.idle{color:var(--muted)}
  .main{padding:24px 28px;max-width:1150px}
  h2{font-family:var(--mono);font-weight:600;font-size:16px;margin-bottom:14px}
  h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px;font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  form .row,.row{display:grid;grid-template-columns:170px 1fr;gap:10px;align-items:center;margin-bottom:10px}
  label{color:var(--muted);font-size:13px}
  input,select,textarea{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:7px 9px;border-radius:8px;font-family:var(--mono);font-size:13px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:64px;resize:vertical;line-height:1.5}
  .lokr-only{display:none} .is-lokr .lokr-only{display:grid}
  .promptline{display:flex;gap:6px;margin-bottom:6px}
  .chartwrap{position:relative}
  canvas{width:100%;height:250px;display:block}
  .chart-legend{position:absolute;top:8px;right:12px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .chart-legend b{color:var(--accent);font-weight:600}
  .statline{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px}
  .statline b{color:var(--text)}
  .samples{display:flex;flex-direction:column;gap:14px}
  .steptitle{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:6px}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap}
  .thumbs img{width:140px;height:140px;object-fit:cover;border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .thumbs img:hover{border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  td,th{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-weight:600}
  pre.log,pre.analysis{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11.5px;line-height:1.55;max-height:280px;overflow:auto;white-space:pre-wrap;word-break:break-word}
  pre.analysis{font-family:var(--sans);font-size:13px;max-height:none}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .spacer{flex:1}
  .dropzone{border:2px dashed var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted);cursor:pointer}
  .dropzone.drag{border-color:var(--accent);color:var(--accent);background:var(--panel-2)}
  .dsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .dsitem{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .dsitem img{width:100%;height:170px;object-fit:cover;display:block}
  .dsitem textarea{border:none;border-top:1px solid var(--line);border-radius:0;min-height:74px;font-size:11.5px;background:var(--panel)}
  .dsitem .selchk{position:absolute;top:8px;left:8px;width:20px;height:20px;z-index:2;cursor:pointer;accent-color:var(--accent)}
  .enh-panel{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px;margin-bottom:16px;display:none}
  .enh-panel textarea{width:100%;min-height:60px;margin-bottom:8px}
  .enh-row-wrap{border-top:1px solid var(--line);padding:10px 0}
  .enh-row-wrap:first-child{border-top:none}
  .enh-row{display:flex;gap:12px;align-items:flex-start}
  .enh-orig{flex:0 0 110px}
  .enh-orig img{width:110px;height:110px;object-fit:cover;border-radius:8px;display:block}
  .enh-orig .hint{margin-top:4px;word-break:break-all}
  .enh-arrow{flex:0 0 auto;color:var(--muted);font-size:20px;padding-top:40px}
  .enh-cands{flex:1;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
  .enh-cand{width:140px}
  .enh-cand button{width:100%;margin-top:4px}
  .enh-cand .hint{margin-top:2px;font-size:10.5px}
  .enh-placeholder{width:140px;height:140px;border-radius:8px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:8px}
  .enh-row-actions{flex:0 0 auto;display:flex;flex-direction:column;gap:6px;padding-top:6px}
  .ba-wrap{position:relative;width:140px;height:140px;border-radius:8px;overflow:hidden;background:var(--panel-2)}
  .ba-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}
  .ba-after{clip-path:inset(0 50% 0 0)}
  .ba-range{width:140px;margin-top:4px;display:block}
  .enh-analysis{margin-top:8px;padding:8px 10px;background:var(--panel-2);border-radius:8px;font-size:12.5px;white-space:pre-wrap}
  .progressbar{height:8px;background:var(--panel-2);border-radius:4px;overflow:hidden}
  .progressbar>div{height:100%;background:var(--accent);width:0%}
  .lightbox{position:fixed;inset:0;background:rgba(8,7,12,.92);display:none;align-items:center;justify-content:center;z-index:10;cursor:zoom-out}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--panel-2);border:1px solid var(--accent);padding:10px 14px;border-radius:8px;font-family:var(--mono);font-size:12px;display:none;z-index:20}
  .empty{color:var(--muted);font-size:13px;padding:8px 0}
  .hint{color:var(--muted);font-size:12px}
  .modal-backdrop{position:fixed;inset:0;background:rgba(8,7,12,.6);display:none;align-items:center;justify-content:center;z-index:30}
  .modal-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;min-width:320px;max-width:90vw}
  .modal-box .modal-title{font-weight:600;margin-bottom:12px}
  .modal-box .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .modal-box input{margin:0}
  .uploadstatus{margin-top:10px}
  .uploadstatus .hint{margin-bottom:4px}
  @media (max-width:820px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="day0">DAY<em>0</em></div><small>Universal trainer · by Yewcake</small></div>
    <nav>
      <button class="primary" onclick="showTrain()">+ New training</button>
      <button id="nav-datasets" onclick="showDatasets()">Datasets</button>
      <button id="nav-settings" onclick="showSettings()">Settings</button>
      <button onclick="toggleTheme()" id="themebtn">Light mode</button>
    </nav>
    <div class="joblist" id="joblist"></div>
    <button onclick="selfUpdate()">↻ Update trainer</button>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="lightbox" id="lightbox" onclick="this.style.display='none'"><img id="lightimg" alt=""></div>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal-box" id="modalBox"></div></div>

<script>
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('day0_token') || '';
let currentJob = null, pollTimer = null, capTimer = null, enhanceTimer = null;

const theme = localStorage.getItem('day0_theme') ||
  (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
document.documentElement.dataset.theme = theme;
function toggleTheme(){
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('day0_theme', next);
  $('#themebtn').textContent = next === 'light' ? 'Dark mode' : 'Light mode';
}
$('#themebtn').textContent = theme === 'light' ? 'Dark mode' : 'Light mode';

function modalPrompt(title, {placeholder='', value='', type='text'}={}){
  return new Promise(resolve=>{
    const backdrop = $('#modalBackdrop'), box = $('#modalBox');
    box.innerHTML = `<div class="modal-title">${title}</div>
      <input id="modalInput" type="${type}" placeholder="${placeholder}" value="${value.replaceAll('"','&quot;')}">
      <div class="modal-actions">
        <button type="button" id="modalCancel">Cancel</button>
        <button type="button" class="primary" id="modalOk">OK</button>
      </div>`;
    backdrop.style.display = 'flex';
    const input = $('#modalInput'); input.focus(); input.select();
    const done = val => { backdrop.style.display = 'none'; resolve(val); };
    $('#modalOk').onclick = () => done(input.value);
    $('#modalCancel').onclick = () => done(null);
    input.onkeydown = e => {
      if (e.key === 'Enter'){ e.preventDefault(); done(input.value); }
      if (e.key === 'Escape') done(null);
    };
  });
}
function modalConfirm(message){
  return new Promise(resolve=>{
    const backdrop = $('#modalBackdrop'), box = $('#modalBox');
    box.innerHTML = `<div class="modal-title">${message}</div>
      <div class="modal-actions">
        <button type="button" id="modalCancel">Cancel</button>
        <button type="button" class="danger" id="modalOk">Confirm</button>
      </div>`;
    backdrop.style.display = 'flex';
    const done = val => { backdrop.style.display = 'none'; resolve(val); };
    $('#modalOk').onclick = () => done(true);
    $('#modalCancel').onclick = () => done(false);
  });
}

let pendingAuthPrompt = null;
function promptForToken(){
  if (!pendingAuthPrompt){
    pendingAuthPrompt = modalPrompt('Access password', {type:'password', placeholder:'Enter the pod UI password'})
      .then(val => {
        TOKEN = val || '';
        localStorage.setItem('day0_token', TOKEN);
        pendingAuthPrompt = null;
        return TOKEN;
      });
  }
  return pendingAuthPrompt;
}

const api = async (path, opts={}) => {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(path + sep + 't=' + encodeURIComponent(TOKEN), opts);
  if (res.status === 401){
    await promptForToken();
    return api(path, opts);
  }
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || res.statusText);
  return res.json();
};
const post = (p,b) => api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const put  = (p,b) => api(p,{method:'PUT', headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const del  = (p)   => api(p,{method:'DELETE'});
const toast = m => { const t=$('#toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3800); };
const stopPolling = () => { clearInterval(pollTimer); clearInterval(capTimer); clearInterval(enhanceTimer); };
const setNav = id => { document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); if(id) $(id)?.classList.add('active'); };

async function refreshJobs(){
  try{
    const jobs = await api('/api/jobs');
    $('#joblist').innerHTML = jobs.map(j =>
      `<div class="jobitem ${j.id===currentJob?'active':''}" onclick="openJob('${j.id}')">
        ${j.config.trigger_word||'run'} · ${j.config.network_type} · ${j.config.model_label||''}
        <span class="st ${j.status}" style="float:right">${j.status}</span><br>
        <span style="color:var(--muted)">${j.id}</span></div>`).join('')
      || '<div class="empty">No jobs yet.</div>';
  }catch(e){}
}

/* ---------------- train form ---------------- */
async function showTrain(){
  currentJob = null; stopPolling(); setNav(null); refreshJobs();
  const [models, settings] = await Promise.all([api('/api/models'), api('/api/settings')]);
  $('#main').innerHTML = `
  <h2>New training</h2>
  <div class="card"><form id="jobform" onsubmit="return submitJob(event)">
    <div class="row"><label>Model</label><select id="f_model">
      ${models.map(m=>`<option value="${m.id}" ${m.enabled?'':'disabled'}>${m.label}</option>`).join('')}
    </select></div>
    <div class="row"><label>Hugging Face token</label>
      <div>
        <input id="f_hf" type="password" placeholder="${settings.hf_token_set ? 'Saved token will be used — leave empty' : 'hf_… (needed to download the model)'}">
        <label class="hint" style="display:block;margin-top:4px"><input type="checkbox" id="f_hf_save" style="width:auto;margin-right:6px">Save token for future runs</label>
      </div></div>
    <div class="row"><label>Dataset</label><select id="f_dataset" onchange="onDatasetChange()"></select></div>
    <div class="row"><label>Trigger word</label><input id="f_trigger" value="" oninput="applyTriggerToPrompts()"></div>
    <div class="row"><label>Validation image</label><select id="f_valimage" onchange="onValidationImageChange()"><option value="">None (skip validation)</option></select></div>
    <div class="row" id="row-valprompt" style="display:none"><label>Validation prompt</label><input id="f_valprompt" value=""></div>
    <div class="row"><label>Network</label><select id="f_network" onchange="$('#jobform').classList.toggle('is-lokr',this.value==='lokr'); if(!$('#f_unlock').checked) applyProvenSettings();">
      <option value="lora">LoRA</option><option value="lokr">LoKr</option></select></div>
    <div class="row"><label>Settings</label>
      <label class="hint" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="f_unlock" style="width:auto" onchange="toggleAdvancedLock()">Show and modify training settings</label>
    </div>
    <div id="advanced-fields">
      <div class="row"><label>Rank</label><input id="f_rank" type="number" value="32"></div>
      <div class="row lokr-only"><label>LoKr factor</label><select id="f_factor">
        <option value="-1" selected>Auto</option>
        <option value="4">4</option>
        <option value="8">8</option>
        <option value="16">16</option>
        <option value="32">32</option>
      </select></div>
      <div class="row lokr-only"><label>LoKr full rank</label><select id="f_fullrank"><option value="0">No (small files)</option><option value="1">Yes (max quality, huge files)</option></select></div>
      <div class="row lokr-only"><label>LoKr decompose both</label><select id="f_decompose"><option value="0">No</option><option value="1">Yes</option></select></div>
      <div class="row"><label>Resolution</label><input id="f_res" type="number" value="1024"></div>
      <div class="row"><label>Optimizer</label><select id="f_optimizer">
        <option value="paged_adamw8bit" selected>Paged AdamW 8-bit (default, memory-safe)</option>
        <option value="adamw8bit">AdamW 8-bit</option>
        <option value="adamw_fused">AdamW (fused)</option>
        <option value="adamw">AdamW</option>
        <option value="automagic">Automagic (adaptive per-parameter LR)</option>
      </select></div>
      <div class="row"><label>Learning rate</label><input id="f_lr" value="1e-4"></div>
      <div class="row"><label>Weight decay</label><input id="f_wd" value="0.01"></div>
      <div class="row"><label>Gradient checkpointing</label><select id="f_gc"><option value="0">Off</option><option value="1" selected>On (saves VRAM)</option></select></div>
    </div>
    <div class="row"><label>Steps</label><input id="f_steps" type="number" value="2000"></div>
    <div class="row"><label>Save every</label><input id="f_save" type="number" value="250"></div>
    <div class="row"><label>Sample every</label><input id="f_sample" type="number" value="500"></div>
    <div class="row"><label>Auto-analyze</label>
      <label class="hint" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="f_autoanalyze" style="width:auto" checked>Automatically analyze with Gemini when training finishes</label>
    </div>
    <div class="row" style="align-items:start"><label style="padding-top:8px">Sample prompts</label>
      <div id="prompts"></div></div>
    <div style="margin-top:14px"><button class="primary" type="submit">Start training</button></div>
  </form></div>`;
  const sets = await api('/api/datasets');
  window._datasetSets = sets;
  $('#f_dataset').innerHTML = sets.map(d=>`<option value="${d.name}">${d.name} (${d.images} images, ${d.captioned} captioned)</option>`).join('')
    || '<option value="">— no datasets, add one first —</option>';
  DEFAULT_PROMPTS.forEach(p => addPrompt(p));
  toggleAdvancedLock();
  await onDatasetChange();
  applyTriggerToPrompts();
}

function applyTriggerToPrompts(){
  const trigger = $('#f_trigger').value.trim();
  if (!trigger) return;
  document.querySelectorAll('#prompts textarea').forEach(t => {
    if (t.value.includes('TRIGGER')) t.value = t.value.replaceAll('TRIGGER', trigger);
  });
}

// Candid/amateur-style prompts on purpose: varied angles, lighting and settings are what
// actually stress-test identity consistency, unlike a handful of similar polished shots.
const DEFAULT_PROMPTS = [
  'A candid smartphone selfie of TRIGGER woman in a bathroom mirror, casual outfit, natural indoor lighting, slightly messy background, no text.',
  'A candid outdoor photo of TRIGGER woman walking down a city street, casual streetwear, natural daylight, slight motion blur, no text.',
  'An amateur photo of TRIGGER woman sitting at a coffee shop table holding a cup, soft window light, slight grain, no text.',
  'A candid gym mirror selfie of TRIGGER woman in workout clothes, phone visible in reflection, gym background, no text.',
  'A low-quality flash photo of TRIGGER woman at a party with friends blurred in the background, slightly overexposed, no text.',
];

async function onDatasetChange(){
  const name = $('#f_dataset').value;
  if (!name){
    $('#f_valimage').innerHTML = '<option value="">None (skip validation)</option>';
    onValidationImageChange();
    return;
  }
  const sets = window._datasetSets || await api('/api/datasets');
  const entry = sets.find(d => d.name === name);
  if (entry && entry.images > 0){
    // ~75 steps/image matches the proven 40-images-to-3000-steps run; scales with dataset size.
    $('#f_steps').value = Math.max(200, Math.round(entry.images * 75));
  }
  if (entry && entry.trigger_word && !$('#f_trigger').value.trim()){
    $('#f_trigger').value = entry.trigger_word;
  }
  try{
    const items = await api(`/api/datasets/${encodeURIComponent(name)}/items`);
    $('#f_valimage').innerHTML = '<option value="">None (skip validation)</option>' +
      items.map(it=>`<option value="${escHtml(it.image)}">${escHtml(it.image)}</option>`).join('');
    // Auto hold out a random image as the validation signal by default -- captioned ones
    // preferred so the prompt auto-fill below isn't blank. Still overridable/skippable
    // via the dropdown. This is a true holdout (excluded from training), not a duplicate --
    // duplicating it would mean training on it too, which defeats the point: validation
    // only means anything if the model never saw that exact image during training.
    if (items.length){
      const captioned = items.filter(it => it.caption);
      const pool = captioned.length ? captioned : items;
      $('#f_valimage').value = pool[Math.floor(Math.random() * pool.length)].image;
    }
  }catch(e){}
  onValidationImageChange();
  applyTriggerToPrompts();
}

async function onValidationImageChange(){
  const img = $('#f_valimage').value;
  $('#row-valprompt').style.display = img ? '' : 'none';
  if (!img) return;
  const name = $('#f_dataset').value;
  try{
    const items = await api(`/api/datasets/${encodeURIComponent(name)}/items`);
    const found = items.find(it => it.image === img);
    $('#f_valprompt').value = found ? found.caption : '';
  }catch(e){}
}

// Settings confirmed working end-to-end on this trainer (fixed the OOM/device-mismatch/
// wrong-optimizer issues from earlier debugging). Locked by default so a first run
// doesn't have to rediscover them; the "edit advanced settings" checkbox unlocks them.
const PROVEN_SETTINGS = {
  lora: {
    f_rank: '32', f_res: '1024', f_optimizer: 'paged_adamw8bit',
    f_lr: '1e-4', f_wd: '0.01', f_gc: '1',
  },
  lokr: {
    f_rank: '32', f_factor: '4', f_fullrank: '1', f_decompose: '0', f_res: '1024',
    f_optimizer: 'automagic', f_lr: '1e-4', f_wd: '0.01', f_gc: '1',
  },
};

async function collectDropped(dt){
  const files = [];
  const entries = [...dt.items].map(i => i.webkitGetAsEntry ? i.webkitGetAsEntry() : null);
  if (entries.some(Boolean)){
    const walk = entry => new Promise(resolve=>{
      if (entry.isFile) entry.file(f=>resolve([f]));
      else if (entry.isDirectory){
        const reader = entry.createReader(); const all = [];
        const read = () => reader.readEntries(async batch=>{
          if (!batch.length){ resolve((await Promise.all(all.map(walk))).flat()); return; }
          all.push(...batch); read();
        });
        read();
      } else resolve([]);
    });
    for (const entry of entries) if (entry) files.push(...await walk(entry));
  } else {
    files.push(...dt.files);
  }
  return files;
}

function uploadChunk(path, form, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', path + (path.includes('?')?'&':'?') + 't=' + encodeURIComponent(TOKEN));
    xhr.upload.onprogress = e => { if (e.lengthComputable) onProgress(e.loaded); };
    xhr.onload = () => {
      if (xhr.status === 401){ resolve({unauthorized:true}); return; }
      if (xhr.status >= 200 && xhr.status < 300){ resolve(JSON.parse(xhr.responseText)); return; }
      let detail = xhr.statusText;
      try{ detail = JSON.parse(xhr.responseText).detail || detail; }catch(e){}
      reject(new Error(detail));
    };
    xhr.onerror = () => reject(new Error('Upload failed'));
    xhr.send(form);
  });
}

function setUploadPct(pct){ $('#uploadbar').style.width = Math.max(0,Math.min(100,pct)) + '%'; }

async function handleFiles(files){
  if (!files.length) return;
  const keep = files.filter(f=>/\.(png|jpe?g|webp|txt|zip|rar|7z)$/i.test(f.name));
  if (!keep.length){ toast('No usable files (images, txt, zip, rar, 7z).'); return; }
  const suggested = keep.length===1 ? keep[0].name.replace(/\.(zip|rar|7z)$/i,'') : 'dataset';
  const name = await modalPrompt('Dataset name (existing name adds to it)', {value: suggested});
  if (!name) return;
  const totalBytes = keep.reduce((s,f)=>s+f.size,0) || 1;
  let sentBytes = 0, uploadedFiles = 0;
  showUpload(true, `Uploading 0/${keep.length} file(s)…`);
  setUploadPct(0);
  const CHUNK = 20;
  try{
    for (let i=0; i<keep.length; i+=CHUNK){
      const slice = keep.slice(i, i+CHUNK);
      const chunkBytes = slice.reduce((s,f)=>s+f.size,0);
      const form = new FormData();
      slice.forEach(f=>form.append('files', f, f.name));
      const result = await uploadChunk(
        `/api/datasets/${encodeURIComponent(name)}/files`, form,
        loaded => setUploadPct(100*(sentBytes+loaded)/totalBytes),
      );
      if (result.unauthorized){ await promptForToken(); i -= CHUNK; continue; }
      sentBytes += chunkBytes; uploadedFiles += slice.length;
      showUpload(true, `Uploading ${uploadedFiles}/${keep.length} file(s)…`);
    }
    toast('Dataset updated.');
  }catch(e){ toast('Upload error: '+e.message); }
  showUpload(false);
  renderDatasetList(); openDataset(name);
}

async function pollEnhanceSetup(name, images){
  const timer = setInterval(async ()=>{
    const el = $('#enhanceSetupStatus');
    if (!el){ clearInterval(timer); return; } // modal was closed/replaced
    const s = await api('/api/enhance/status');
    el.textContent = `${s.status}${s.detail ? ': '+s.detail : ''}`;
    const barWrap = $('#enhanceSetupBarWrap'), bar = $('#enhanceSetupBar');
    if (bar) bar.style.width = (s.pct||0)+'%';
    if (barWrap) barWrap.style.display = (s.status==='downloading' && s.pct!=null) ? '' : 'none';
    if (s.status === 'ready'){
      clearInterval(timer);
      $('#modalBackdrop').style.display = 'none';
      await doQueueEnhance(name, images);
    } else if (s.status === 'failed'){
      clearInterval(timer);
      el.textContent = 'Failed: ' + s.error;
      const btn = $('#modalOk'); if (btn){ btn.disabled = false; btn.textContent = 'Retry setup'; }
    }
  }, 3000);
}

let _enhanceAnalysisCache = {};

async function pollEnhanceQueue(name){
  const panel = $('#enhancePanel'), rows = $('#enhanceRows');
  if (!panel || !rows) return;
  let items;
  try{ items = (await api(`/api/datasets/${encodeURIComponent(name)}/enhance/queue`)).items; }
  catch(e){ return; }
  panel.style.display = items.length ? 'block' : 'none';

function dimsLabel(w, h){
  return (w && h) ? `${w}×${h} (${(w*h/1e6).toFixed(2)}MP)` : '';
}

function renderEnhanceRow(name, it){
  const thumb = `/api/datasets/${encodeURIComponent(name)}/thumb/${encodeURIComponent(it.image)}?t=${encodeURIComponent(TOKEN)}`;
  const dsItem = _dsItemsCache.find(d => d.image === it.image);
  const origDims = dsItem ? dimsLabel(dsItem.width, dsItem.height) : '';
  let candsHtml;
  if (it.status === 'done'){
    candsHtml = it.candidates.map(c=>{
      const src = `/api/datasets/${encodeURIComponent(name)}/enhance/${encodeURIComponent(it.image)}/candidate/${encodeURIComponent(c)}?t=${encodeURIComponent(TOKEN)}`;
      return `<div class="enh-cand">
        <div class="ba-wrap">
          <img class="ba-before" src="${thumb}">
          <img class="ba-after" src="${src}" onclick="lightbox('${src}')"
            onload="this.closest('.enh-cand').querySelector('.enh-cand-dims').textContent=dimsLabel(this.naturalWidth,this.naturalHeight)">
        </div>
        <input type="range" class="ba-range" min="0" max="100" value="50" oninput="baSlide(this)">
        <div class="hint enh-cand-dims"></div>
        <button type="button" class="small" onclick="enhanceReplace('${name}','${escHtml(it.image)}','${c}')">Replace original</button>
        <button type="button" class="small" onclick="enhanceAddNew('${name}','${escHtml(it.image)}','${c}')">Add as new</button>
      </div>`;
    }).join('');
  } else if (it.status === 'error'){
    candsHtml = `<div class="enh-placeholder">Failed: ${escHtml(it.error)}</div>`;
  } else {
    const label = it.status === 'running' ? 'Generating…' : 'Queued…';
    candsHtml = Array.from({length: it.count || 1}).map(()=>`<div class="enh-placeholder">${label}</div>`).join('');
  }
  const cachedAnalysis = _enhanceAnalysisCache[`${name}::${it.image}`];
  const analysisHtml = cachedAnalysis ? `<div class="enh-analysis">${escHtml(cachedAnalysis)}</div>` : '';
  return `<div class="enh-row-wrap">
    <div class="enh-row">
      <div class="enh-orig"><img src="${thumb}"><div class="hint">${escHtml(it.image)}</div><div class="hint">${origDims}</div></div>
      <div class="enh-arrow">&rarr;</div>
      <div class="enh-cands">${candsHtml}</div>
      <div class="enh-row-actions">
        <button type="button" class="small" onclick="enhanceRegenerate('${name}','${escHtml(it.image)}')" ${it.status==='running'?'disabled':''}>Regenerate</button>
        <button type="button" class="small" onclick="enhanceSkip('${name}','${escHtml(it.image)}')">Skip</button>
        ${it.status==='done' ? `<button type="button" class="small" onclick="enhanceGeminiPick('${name}','${escHtml(it.image)}')">✦ Analyze</button>` : ''}
      </div>
    </div>
    ${analysisHtml}
  </div>`;
}

  if (el.value === el.dataset.saved) return;
  await put(`/api/datasets/${encodeURIComponent(name)}/caption/${encodeURIComponent(el.dataset.image)}`, {caption: el.value});
  el.dataset.saved = el.value;
  toast('Caption saved.');
}

async function saveAllCaptions(name){
  const boxes = [...document.querySelectorAll('#dsgrid textarea')];
  let saved = 0;
  for (const el of boxes){
    if (el.value !== el.dataset.saved){
      await put(`/api/datasets/${encodeURIComponent(name)}/caption/${encodeURIComponent(el.dataset.image)}`, {caption: el.value});
      el.dataset.saved = el.value; saved++;
    }
  }
  toast(saved ? `Saved ${saved} caption(s).` : 'Nothing to save — all captions already saved.');
}

async function refreshCaptionsLive(name, force){
  const items = await api(`/api/datasets/${encodeURIComponent(name)}/items`);
  for (const it of items){
    const box = document.querySelector(`#dsgrid textarea[data-image="${CSS.escape(it.image)}"]`);
    if (!box) continue;
    if (document.activeElement === box && !force) continue; // don't clobber an in-progress edit
    if (box.dataset.saved === it.caption) continue; // no change since last render
    box.value = it.caption;
    box.dataset.saved = it.caption;
  }
}

async function captionAll(name){
  try{
    await post(`/api/datasets/${encodeURIComponent(name)}/caption-all`, {
      model: $('#cap_model').value, instruction: $('#cap_instruction').value,
      trigger_word: $('#cap_trigger').value.trim(), only_missing: $('#cap_scope').value==='1',
    });
  }catch(e){ toast(e.message); return; }
  clearInterval(capTimer);
  capTimer = setInterval(async ()=>{
    const s = await api(`/api/datasets/${encodeURIComponent(name)}/caption-status`);
    const pct = s.total ? Math.round(100*s.done/s.total) : 0;
    $('#cap_bar').style.width = pct+'%';
    $('#cap_stat').textContent = `${s.status} ${s.done||0}/${s.total||0}` + (s.errors?.length?` · ${s.errors.length} errors`:'');
    await refreshCaptionsLive(name);
    if (['finished','cancelled','idle'].includes(s.status)){
      clearInterval(capTimer); await refreshCaptionsLive(name, true); renderDatasetList();
      if (s.errors?.length) toast(s.errors[0]);
    }
  }, 2000);
}
async function cancelCaption(name){ await post(`/api/datasets/${encodeURIComponent(name)}/caption-cancel`); }

  currentJob = id; stopPolling(); setNav(null); refreshJobs();
  $('#main').innerHTML = `
    <div class="toolbar"><h2 style="margin:0">${id}</h2><span class="st" id="jobstatus"></span>
      <div class="spacer"></div>
      <button onclick="analyzeJob('${id}')">✦ Analyze with Gemini</button>
      <button class="danger" onclick="stopJob('${id}')">Stop</button>
      <button class="danger" onclick="deleteJob('${id}')">Delete</button></div>
    <div class="card chartwrap"><canvas id="chart" height="250"></canvas>
      <div class="chart-legend">loss · <b>ema</b> · <span style="opacity:.6">min/max band</span><span id="chart-legend-val" style="display:none"> · <b style="color:var(--err)">val loss</b></span></div>
      <div class="statline" id="statline"></div></div>
    <div id="analysis"></div>
    <h3>Samples</h3><div class="samples" id="samples"><div class="empty">No samples yet.</div></div>
    <h3>Checkpoints</h3><div id="checkpoints"><div class="empty">No checkpoints yet.</div></div>
    <h3>Log</h3><pre class="log" id="log"></pre>`;
  let analysisShown = false;
  const checkAnalysis = async () => {
    if (analysisShown) return;
    const existing = await api(`/api/jobs/${id}/analysis`);
    if (existing.analysis){

  // for it to appear (e.g. "analyze on completion" was checked) until it shows up.
  const poll = () => { drawMetrics(id); loadSamples(id); loadCheckpoints(id); loadLog(id); checkAnalysis(); };

function ema(values, alpha=0.06){ const out=[]; let prev=values[0]; for(const v of values){ prev=alpha*v+(1-alpha)*prev; out.push(prev);} return out; }

// Rolling min/max over a recent window of raw (noisy) loss values -- lets the chart show
// spike amplitude shrinking over a run, which is the visible signature of a cosine schedule
// actually converging (vs. a flat/non-shrinking band, which flags LR not decaying enough).
function rollingMinMax(values, window){
  const mins = [], maxs = [];
  for (let i=0;i<values.length;i++){
    const start = Math.max(0, i-window+1);
    let mn=Infinity, mx=-Infinity;
    for (let j=start;j<=i;j++){ if(values[j]<mn) mn=values[j]; if(values[j]>mx) mx=values[j]; }
    mins.push(mn); maxs.push(mx);
  }
  return {mins, maxs};
}

async function drawMetrics(id){
  const data = await api(`/api/jobs/${id}/metrics`);
  const st = $('#jobstatus'); if(st){ st.textContent=data.status; st.className='st '+data.status; }
  const pts = data.points, canvas = $('#chart'); if(!canvas || !pts.length) return;
  const dpr = devicePixelRatio||1, W = canvas.clientWidth, H = 250;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const loss = pts.map(p=>p.loss), steps = pts.map(p=>p.step), smooth = ema(loss);
  // val_loss is sparse (only logged at checkpoint cadence) and deterministic (same held-out
  // image/noise/seed every time), unlike the noisy per-step training loss -- the cleaner signal.
  const valPoints = pts.map((p,i)=>({i, v:p.val_loss})).filter(p=>p.v!=null && !isNaN(p.v));
  const pad = {l:46,r:10,t:12,b:22};
  const rangeSource = loss.concat(valPoints.map(p=>p.v));
  const sorted = [...rangeSource].sort((a,b)=>a-b);
  const lo = sorted[0], hi = sorted[Math.floor(sorted.length*0.98)] ?? sorted.at(-1);
  const x = i => pad.l + (W-pad.l-pad.r)*(i/(pts.length-1||1));
  const y = v => pad.t + (H-pad.t-pad.b)*(1-Math.min(1,Math.max(0,(v-lo)/((hi-lo)||1))));
  const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  ctx.strokeStyle = css('--line'); ctx.fillStyle = css('--muted'); ctx.font='11px '+css('--mono'); ctx.lineWidth=1;
  for(let g=0; g<=4; g++){
    const gy = pad.t+(H-pad.t-pad.b)*g/4;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke();
    ctx.fillText((hi-(hi-lo)*g/4).toFixed(3), 4, gy+3);
  }
  ctx.fillText(String(steps[0]), pad.l, H-6); ctx.fillText(String(steps.at(-1)), W-pad.r-36, H-6);
  if (loss.length > 1){
    const envWindow = 15;
    const {mins: envMin, maxs: envMax} = rollingMinMax(loss, envWindow);
    ctx.beginPath();
    envMax.forEach((v,i)=> i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));
    for (let i=envMin.length-1;i>=0;i--){ ctx.lineTo(x(i), y(envMin[i])); }
    ctx.closePath();
    ctx.fillStyle = css('--accent'); ctx.globalAlpha = 0.12; ctx.fill(); ctx.globalAlpha = 1;
  }
  ctx.strokeStyle = css('--muted'); ctx.globalAlpha = 0.35; ctx.beginPath();
  loss.forEach((v,i)=> i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))); ctx.stroke(); ctx.globalAlpha = 1;
  ctx.lineWidth=2; ctx.strokeStyle = css('--accent'); ctx.beginPath();
  smooth.forEach((v,i)=> i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))); ctx.stroke();
  if (valPoints.length){
    ctx.lineWidth=2; ctx.strokeStyle = css('--err'); ctx.beginPath();
    valPoints.forEach((p,idx)=> idx?ctx.lineTo(x(p.i),y(p.v)):ctx.moveTo(x(p.i),y(p.v))); ctx.stroke();
    ctx.fillStyle = css('--err');
    valPoints.forEach(p=>{ ctx.beginPath(); ctx.arc(x(p.i), y(p.v), 2.5, 0, Math.PI*2); ctx.fill(); });
  }
  $('#chart-legend-val').style.display = valPoints.length ? '' : 'none';
  const last = pts.at(-1);
  const lastVal = valPoints.length ? valPoints.at(-1).v : null;
  const stepLabel = data.total_steps ? `${last.step}/${data.total_steps}` : String(last.step);
  let timerHtml = '';
  if (data.elapsed_seconds != null){
    timerHtml = ` · elapsed <b>${formatDuration(data.elapsed_seconds)}</b>`;
    if (data.status === 'running' && data.total_steps && last.step > 0){
      const secPerStep = data.elapsed_seconds / last.step;
      const remaining = secPerStep * Math.max(0, data.total_steps - last.step);
      timerHtml += ` · ETA <b>${formatDuration(remaining)}</b>`;
    }
  }
  $('#statline').innerHTML = `step <b>${stepLabel}</b> · loss <b>${last.loss.toFixed(4)}</b> · ema <b>${smooth.at(-1).toFixed(4)}</b>` +
    (lastVal!=null ? ` · val_loss <b>${lastVal.toFixed(4)}</b>` : '') +
    ` · lr <b>${Number(last.lr).toExponential(1)}</b> · epoch <b>${last.epoch}</b>` + timerHtml;
}

function formatDuration(seconds){
  if (seconds == null || !isFinite(seconds) || seconds < 0) return '—';
  const s = Math.round(seconds);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m ${sec}s`;
  return `${sec}s`;
}

async function loadSamples(id){
  const groups = await api(`/api/jobs/${id}/samples`);
  if(!groups.length) return;
  $('#samples').innerHTML = groups.slice().reverse().map(g=>`
    <div><div class="steptitle">${g.step}</div><div class="thumbs">
      ${g.images.map(img=>{
        const src = `/api/jobs/${id}/samples/${g.step}/${img}?t=${encodeURIComponent(TOKEN)}`;
        return `<img loading="lazy" src="${src}" alt="${img}" title="${img}" onclick="lightbox('${src}')">`;
      }).join('')}</div></div>`).join('');
}

function lightbox(src){ $('#lightimg').src = src; $('#lightbox').style.display='flex'; }

async function loadCheckpoints(id){
  const cps = await api(`/api/jobs/${id}/checkpoints`);
  if(!cps.length) return;
  $('#checkpoints').innerHTML = `<div class="card" style="padding:0"><table>
    <tr><th>Checkpoint</th><th>Size</th><th></th></tr>
    ${cps.map(c=>`<tr><td>${c.step}</td><td>${c.size_mb} MB</td>
      <td><a href="/api/jobs/${id}/checkpoints/${c.step}/download?t=${encodeURIComponent(TOKEN)}">download</a></td></tr>`).join('')}
  </table></div>`;
}

async function loadLog(id){
  const data = await api(`/api/jobs/${id}/log`);
  const el = $('#log'); if(!el) return;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  el.textContent = data.lines.join('\n');
  if(atBottom) el.scrollTop = el.scrollHeight;
}

  <div class="card">
    <div class="row"><label>Hugging Face token</label>
      <input id="s_hf" type="password" placeholder="${s.hf_token_set?'saved — enter new value to replace':'hf_…'}"></div>
    <div class="row"><label>Gemini API key</label>
      <input id="s_gem" type="password" placeholder="${s.gemini_key_set?'saved — enter new value to replace':'AI Studio key for captioner + analysis'}"></div>
    <div class="row"><label>Civitai API key</label>
      <input id="s_civitai" type="password" placeholder="${s.civitai_key_set?'saved — enter new value to replace':'optional, only needed if the enhance realism LoRA download 401s'}"></div>

async function fetchSettingsModels(){
  if ($('#s_gem').value.trim()) await put('/api/settings', {gemini_api_key: $('#s_gem').value.trim()});
  try{
    const models = await api('/api/gemini/models');
    const current = (await api('/api/settings')).gemini_model;
    $('#s_gemmodel').innerHTML = models.map(m=>`<option value="${m.id}" ${m.id===current?'selected':''}>${m.label}</option>`).join('');
  }catch(e){ toast(e.message); }
}
async function saveSettings(){
  await put('/api/settings', {
    hf_token: $('#s_hf').value.trim() || undefined,
    gemini_api_key: $('#s_gem').value.trim() || undefined,
    civitai_api_key: $('#s_civitai').value.trim() || undefined,
    gemini_model: $('#s_gemmodel').value || undefined,
  });
  toast('Settings saved.');
}

async function selfUpdate(){
  if(!(await modalConfirm('Pull latest code and restart the UI? (Not possible while a job is running.)'))) return;
  try{ await post('/api/update'); }catch(e){ toast(e.message); return; }
  toast('Updating… reconnecting shortly.');
  setTimeout(()=>location.reload(), 8000);
}
