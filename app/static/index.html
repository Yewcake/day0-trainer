<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day0 Trainer</title>
<style>
  :root{
    --bg:#0e0d12; --panel:#16141d; --panel-2:#1d1a27; --line:#2b2738;
    --text:#ece9f4; --muted:#8d87a0; --accent:#a78bfa; --accent-strong:#8b6cf6;
    --ok:#9d8ef0; --err:#f07178; --on-accent:#17102e;
    --mono:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  [data-theme="light"]{
    --bg:#f7f6fb; --panel:#ffffff; --panel-2:#f1eef9; --line:#e0dcee;
    --text:#1d1a27; --muted:#6f6a83; --accent:#7c6cf0; --accent-strong:#6a58e8;
    --ok:#6a58e8; --err:#d4494f; --on-accent:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
  a{color:var(--accent)}
  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:14px}
  .brand{font-family:var(--mono);line-height:1.15}
  .brand .day0{font-size:24px;font-weight:700;letter-spacing:2px}
  .brand .day0 em{color:var(--accent);font-style:normal}
  .brand small{color:var(--muted);display:block;margin-top:2px}
  nav{display:flex;flex-direction:column;gap:4px}
  nav button{text-align:left}
  button{font-family:var(--sans);font-size:13px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  button.primary{background:var(--accent-strong);border-color:var(--accent-strong);color:var(--on-accent);font-weight:600}
  button.primary:hover{filter:brightness(1.06)}
  button.danger{border-color:var(--err);color:var(--err);background:transparent}
  button.small{padding:4px 9px;font-size:12px}
  button.active{border-color:var(--accent);color:var(--accent)}
  .joblist{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
  .jobitem{padding:8px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11.5px}
  .jobitem:hover,.jobitem.active{border-color:var(--accent);background:var(--panel-2)}
  .st{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .st.running{color:var(--accent)} .st.finished{color:var(--text)}
  .st.failed,.st.stopped{color:var(--err)} .st.unknown,.st.idle{color:var(--muted)}
  .main{padding:24px 28px;max-width:1150px}
  h2{font-family:var(--mono);font-weight:600;font-size:16px;margin-bottom:14px}
  h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px;font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  form .row,.row{display:grid;grid-template-columns:170px 1fr;gap:10px;align-items:center;margin-bottom:10px}
  label{color:var(--muted);font-size:13px}
  input,select,textarea{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:7px 9px;border-radius:8px;font-family:var(--mono);font-size:13px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:64px;resize:vertical;line-height:1.5}
  .lokr-only{display:none} .is-lokr .lokr-only{display:grid}
  .promptline{display:flex;gap:6px;margin-bottom:6px}
  .chartwrap{position:relative}
  canvas{width:100%;height:250px;display:block}
  .chart-legend{position:absolute;top:8px;right:12px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .chart-legend b{color:var(--accent);font-weight:600}
  .statline{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px}
  .statline b{color:var(--text)}
  .samples{display:flex;flex-direction:column;gap:14px}
  .steptitle{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:6px}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap}
  .thumbs img{width:140px;height:140px;object-fit:cover;border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .thumbs img:hover{border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  td,th{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-weight:600}
  pre.log,pre.analysis{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11.5px;line-height:1.55;max-height:280px;overflow:auto;white-space:pre-wrap;word-break:break-word}
  pre.analysis{font-family:var(--sans);font-size:13px;max-height:none}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .spacer{flex:1}
  .dropzone{border:2px dashed var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted);cursor:pointer}
  .dropzone.drag{border-color:var(--accent);color:var(--accent);background:var(--panel-2)}
  .dsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .dsitem{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .dsitem img{width:100%;height:170px;object-fit:cover;display:block}
  .dsitem textarea{border:none;border-top:1px solid var(--line);border-radius:0;min-height:74px;font-size:11.5px;background:var(--panel)}
  .progressbar{height:8px;background:var(--panel-2);border-radius:4px;overflow:hidden}
  .progressbar>div{height:100%;background:var(--accent);width:0%}
  .lightbox{position:fixed;inset:0;background:rgba(8,7,12,.92);display:none;align-items:center;justify-content:center;z-index:10;cursor:zoom-out}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--panel-2);border:1px solid var(--accent);padding:10px 14px;border-radius:8px;font-family:var(--mono);font-size:12px;display:none;z-index:20}
  .empty{color:var(--muted);font-size:13px;padding:8px 0}
  .hint{color:var(--muted);font-size:12px}
  @media (max-width:820px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="day0">DAY<em>0</em></div><small>Universal trainer · by Yewcake</small></div>
    <nav>
      <button class="primary" onclick="showTrain()">+ New training</button>
      <button id="nav-datasets" onclick="showDatasets()">Datasets</button>
      <button id="nav-settings" onclick="showSettings()">Settings</button>
      <button onclick="toggleTheme()" id="themebtn">Light mode</button>
    </nav>
    <div class="joblist" id="joblist"></div>
    <button onclick="selfUpdate()">↻ Update trainer</button>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="lightbox" id="lightbox" onclick="this.style.display='none'"><img id="lightimg" alt=""></div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('day0_token') || '';
let currentJob = null, pollTimer = null, capTimer = null;

const theme = localStorage.getItem('day0_theme') ||
  (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
document.documentElement.dataset.theme = theme;
function toggleTheme(){
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('day0_theme', next);
  $('#themebtn').textContent = next === 'light' ? 'Dark mode' : 'Light mode';
}
$('#themebtn').textContent = theme === 'light' ? 'Dark mode' : 'Light mode';

const api = async (path, opts={}) => {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(path + sep + 't=' + encodeURIComponent(TOKEN), opts);
  if (res.status === 401){
    TOKEN = prompt('Access password:') || '';
    localStorage.setItem('day0_token', TOKEN);
    return api(path, opts);
  }
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || res.statusText);
  return res.json();
};
const post = (p,b) => api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const put  = (p,b) => api(p,{method:'PUT', headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const toast = m => { const t=$('#toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3800); };
const stopPolling = () => { clearInterval(pollTimer); clearInterval(capTimer); };
const setNav = id => { document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); if(id) $(id)?.classList.add('active'); };

async function refreshJobs(){
  try{
    const jobs = await api('/api/jobs');
    $('#joblist').innerHTML = jobs.map(j =>
      `<div class="jobitem ${j.id===currentJob?'active':''}" onclick="openJob('${j.id}')">
        ${j.config.trigger_word||'run'} · ${j.config.network_type} · ${j.config.model_label||''}
        <span class="st ${j.status}" style="float:right">${j.status}</span><br>
        <span style="color:var(--muted)">${j.id}</span></div>`).join('')
      || '<div class="empty">No jobs yet.</div>';
  }catch(e){}
}

/* ---------------- train form ---------------- */
async function showTrain(){
  currentJob = null; stopPolling(); setNav(null); refreshJobs();
  const [models, settings] = await Promise.all([api('/api/models'), api('/api/settings')]);
  $('#main').innerHTML = `
  <h2>New training</h2>
  <div class="card"><form id="jobform" onsubmit="return submitJob(event)">
    <div class="row"><label>Model</label><select id="f_model">
      ${models.map(m=>`<option value="${m.id}" ${m.enabled?'':'disabled'}>${m.label}</option>`).join('')}
    </select></div>
    <div class="row"><label>Hugging Face token</label>
      <div>
        <input id="f_hf" type="password" placeholder="${settings.hf_token_set ? 'Saved token will be used — leave empty' : 'hf_… (needed to download the model)'}">
        <label class="hint" style="display:block;margin-top:4px"><input type="checkbox" id="f_hf_save" style="width:auto;margin-right:6px">Save token for future runs</label>
      </div></div>
    <div class="row"><label>Dataset</label><select id="f_dataset"></select></div>
    <div class="row"><label>Trigger word</label><input id="f_trigger" value=""></div>
    <div class="row"><label>Network</label><select id="f_network" onchange="$('#jobform').classList.toggle('is-lokr',this.value==='lokr')">
      <option value="lora">LoRA</option><option value="lokr">LoKr</option></select></div>
    <div class="row"><label>Rank</label><input id="f_rank" type="number" value="32"></div>
    <div class="row lokr-only"><label>LoKr factor</label><input id="f_factor" type="number" value="16"></div>
    <div class="row lokr-only"><label>LoKr full rank</label><select id="f_fullrank"><option value="0">No (small files)</option><option value="1">Yes (max quality, huge files)</option></select></div>
    <div class="row"><label>Resolution</label><input id="f_res" type="number" value="1024"></div>
    <div class="row"><label>Steps</label><input id="f_steps" type="number" value="2000"></div>
    <div class="row"><label>Save every</label><input id="f_save" type="number" value="250"></div>
    <div class="row"><label>Sample every</label><input id="f_sample" type="number" value="500"></div>
    <div class="row"><label>Learning rate</label><input id="f_lr" value="8e-5"></div>
    <div class="row"><label>Gradient checkpointing</label><select id="f_gc"><option value="0">Off</option><option value="1">On (saves VRAM)</option></select></div>
    <div class="row" style="align-items:start"><label style="padding-top:8px">Sample prompts</label>
      <div id="prompts"></div></div>
    <div style="margin-top:14px"><button class="primary" type="submit">Start training</button></div>
  </form></div>`;
  const sets = await api('/api/datasets');
  $('#f_dataset').innerHTML = sets.map(d=>`<option value="${d.name}">${d.name} (${d.images} images, ${d.captioned} captioned)</option>`).join('')
    || '<option value="">— no datasets, add one first —</option>';
  addPrompt('A realistic smartphone portrait photo of TRIGGER woman, natural expression, daylight, no text.');
  addPrompt('A candid outdoor selfie photo of TRIGGER woman, relaxed expression, blurred city background, no text.');
}

function addPrompt(value=''){
  const line = document.createElement('div'); line.className = 'promptline';
  line.innerHTML = `<textarea style="min-height:44px;flex:1">${value}</textarea>
    <button type="button" class="small" title="Remove prompt" onclick="this.parentElement.remove()">✕</button>`;
  $('#prompts').appendChild(line);
  ensureAddBtn();
}
function ensureAddBtn(){
  $('#prompt-add')?.remove();
  const btn = document.createElement('button');
  btn.type='button'; btn.id='prompt-add'; btn.className='small'; btn.textContent='+ Add prompt';
  btn.onclick = () => addPrompt('');
  $('#prompts').appendChild(btn);
}

async function submitJob(ev){
  ev.preventDefault();
  const trigger = $('#f_trigger').value.trim();
  const prompts = [...document.querySelectorAll('#prompts textarea')]
    .map(t=>t.value.trim().replaceAll('TRIGGER', trigger||'TRIGGER')).filter(Boolean);
  const payload = {
    model_id: $('#f_model').value, dataset: $('#f_dataset').value, trigger_word: trigger,
    hf_token: $('#f_hf').value.trim(), save_hf_token: $('#f_hf_save').checked,
    network_type: $('#f_network').value, rank:+$('#f_rank').value,
    lokr_factor:+$('#f_factor').value, lokr_full_rank:+$('#f_fullrank').value,
    resolution:+$('#f_res').value, steps:+$('#f_steps').value,
    save_every:+$('#f_save').value, sample_every:+$('#f_sample').value,
    learning_rate: $('#f_lr').value, gradient_checkpointing:+$('#f_gc').value,
    sample_prompts: prompts,
  };
  try{ const job = await post('/api/jobs', payload); toast('Training started.'); openJob(job.id); }
  catch(e){ toast('Error: '+e.message); }
  return false;
}

/* ---------------- datasets + captioner ---------------- */
async function showDatasets(){
  currentJob = null; stopPolling(); setNav('#nav-datasets'); refreshJobs();
  $('#main').innerHTML = `
    <h2>Datasets</h2>
    <div class="dropzone" id="dropzone" onclick="$('#fileinput').click()">
      Drop a folder, .zip / .rar / .7z, or loose images here — or click to browse
      <input type="file" id="fileinput" multiple style="display:none" onchange="handleFiles([...this.files])">
    </div>
    <div id="dslist" style="margin-top:16px"></div>
    <div id="dsdetail"></div>`;
  const zone = $('#dropzone');
  zone.addEventListener('dragover', e=>{e.preventDefault(); zone.classList.add('drag');});
  zone.addEventListener('dragleave', ()=>zone.classList.remove('drag'));
  zone.addEventListener('drop', async e=>{
    e.preventDefault(); zone.classList.remove('drag');
    handleFiles(await collectDropped(e.dataTransfer));
  });
  renderDatasetList();
}

async function collectDropped(dt){
  const files = [];
  const entries = [...dt.items].map(i => i.webkitGetAsEntry ? i.webkitGetAsEntry() : null);
  if (entries.some(Boolean)){
    const walk = entry => new Promise(resolve=>{
      if (entry.isFile) entry.file(f=>resolve([f]));
      else if (entry.isDirectory){
        const reader = entry.createReader(); const all = [];
        const read = () => reader.readEntries(async batch=>{
          if (!batch.length){ resolve((await Promise.all(all.map(walk))).flat()); return; }
          all.push(...batch); read();
        });
        read();
      } else resolve([]);
    });
    for (const entry of entries) if (entry) files.push(...await walk(entry));
  } else {
    files.push(...dt.files);
  }
  return files;
}

async function handleFiles(files){
  if (!files.length) return;
  const keep = files.filter(f=>/\.(png|jpe?g|webp|txt|zip|rar|7z)$/i.test(f.name));
  if (!keep.length){ toast('No usable files (images, txt, zip, rar, 7z).'); return; }
  const suggested = keep.length===1 ? keep[0].name.replace(/\.(zip|rar|7z)$/i,'') : 'dataset';
  const name = prompt('Dataset name (existing name adds to it):', suggested);
  if (!name) return;
  toast(`Uploading ${keep.length} file(s)…`);
  const CHUNK = 20;
  for (let i=0; i<keep.length; i+=CHUNK){
    const form = new FormData();
    keep.slice(i, i+CHUNK).forEach(f=>form.append('files', f, f.name));
    await api(`/api/datasets/${encodeURIComponent(name)}/files`, {method:'POST', body:form});
  }
  toast('Dataset updated.'); renderDatasetList(); openDataset(name);
}

async function renderDatasetList(){
  const sets = await api('/api/datasets');
  $('#dslist').innerHTML = sets.length ? `<div class="card" style="padding:0"><table>
    <tr><th>Name</th><th>Images</th><th>Captioned</th><th></th><th></th></tr>
    ${sets.map(d=>`<tr><td>${d.name}</td><td>${d.images}</td><td>${d.captioned}</td>
      <td><a href="#" onclick="openDataset('${d.name}');return false">open</a></td>
      <td><a href="#" style="color:var(--err)" onclick="deleteDataset('${d.name}');return false">delete</a></td></tr>`).join('')}
  </table></div>` : '<div class="empty">No datasets yet.</div>';
}

async function deleteDataset(name){
  if (!confirm(`Delete dataset '${name}' and all its files?`)) return;
  await api(`/api/datasets/${encodeURIComponent(name)}`, {method:'DELETE'});
  toast('Dataset deleted.'); renderDatasetList(); $('#dsdetail').innerHTML='';
}

async function openDataset(name){
  clearInterval(capTimer);
  const def = await api('/api/caption-default-instruction');
  $('#dsdetail').innerHTML = `
    <h3>Captioner — ${name}</h3>
    <div class="card">
      <div class="row"><label>Gemini model</label>
        <div style="display:flex;gap:8px"><select id="cap_model" style="flex:1"><option value="">— load models —</option></select>
        <button type="button" class="small" onclick="loadGeminiModels()">↻ Fetch models</button></div></div>
      <div class="row"><label>Trigger word</label><input id="cap_trigger" placeholder="prefixed to every caption (optional)"></div>
      <div class="row" style="align-items:start"><label style="padding-top:8px">Instruction</label>
        <textarea id="cap_instruction" style="min-height:110px">${def.instruction}</textarea></div>
      <div class="row"><label>Scope</label><select id="cap_scope">
        <option value="1">Only images without a caption</option><option value="0">All images (overwrite)</option></select></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <button class="primary" type="button" onclick="captionAll('${name}')">Caption images</button>
        <button type="button" onclick="cancelCaption('${name}')">Cancel</button>
        <div class="progressbar" style="flex:1"><div id="cap_bar"></div></div>
        <span class="hint" id="cap_stat">idle</span></div>
    </div>
    <h3>Images</h3><div class="dsgrid" id="dsgrid"></div>`;
  loadGeminiModels(true);
  renderItems(name);
}

async function loadGeminiModels(silent){
  try{
    const models = await api('/api/gemini/models');
    const saved = (await api('/api/settings')).gemini_model;
    $('#cap_model').innerHTML = models.map(m=>`<option value="${m.id}" ${m.id===saved?'selected':''}>${m.label}</option>`).join('');
  }catch(e){ if(!silent) toast(e.message); }
}

async function renderItems(name){
  const items = await api(`/api/datasets/${encodeURIComponent(name)}/items`);
  $('#dsgrid').innerHTML = items.map(it=>{
    const src = `/api/datasets/${encodeURIComponent(name)}/thumb/${encodeURIComponent(it.image)}?t=${encodeURIComponent(TOKEN)}`;
    return `<div class="dsitem"><img loading="lazy" src="${src}" alt="${it.image}" onclick="lightbox('${src}&size=1024')">
      <textarea placeholder="no caption" onblur="saveCaption('${name}','${it.image}',this)">${it.caption}</textarea></div>`;
  }).join('') || '<div class="empty">No images.</div>';
}

async function saveCaption(name, image, el){
  await put(`/api/datasets/${encodeURIComponent(name)}/caption/${encodeURIComponent(image)}`, {caption: el.value});
  toast('Caption saved.');
}

async function captionAll(name){
  try{
    await post(`/api/datasets/${encodeURIComponent(name)}/caption-all`, {
      model: $('#cap_model').value, instruction: $('#cap_instruction').value,
      trigger_word: $('#cap_trigger').value.trim(), only_missing: $('#cap_scope').value==='1',
    });
  }catch(e){ toast(e.message); return; }
  clearInterval(capTimer);
  capTimer = setInterval(async ()=>{
    const s = await api(`/api/datasets/${encodeURIComponent(name)}/caption-status`);
    const pct = s.total ? Math.round(100*s.done/s.total) : 0;
    $('#cap_bar').style.width = pct+'%';
    $('#cap_stat').textContent = `${s.status} ${s.done||0}/${s.total||0}` + (s.errors?.length?` · ${s.errors.length} errors`:'');
    if (['finished','cancelled','idle'].includes(s.status)){
      clearInterval(capTimer); renderItems(name); renderDatasetList();
      if (s.errors?.length) toast(s.errors[0]);
    }
  }, 2000);
}
async function cancelCaption(name){ await post(`/api/datasets/${encodeURIComponent(name)}/caption-cancel`); }

/* ---------------- job detail ---------------- */
async function openJob(id){
  currentJob = id; stopPolling(); setNav(null); refreshJobs();
  $('#main').innerHTML = `
    <div class="toolbar"><h2 style="margin:0">${id}</h2><span class="st" id="jobstatus"></span>
      <div class="spacer"></div>
      <button onclick="analyzeJob('${id}')">✦ Analyze with Gemini</button>
      <button class="danger" onclick="stopJob('${id}')">Stop</button>
      <button class="danger" onclick="deleteJob('${id}')">Delete</button></div>
    <div class="card chartwrap"><canvas id="chart" height="250"></canvas>
      <div class="chart-legend">loss · <b>ema</b></div>
      <div class="statline" id="statline"></div></div>
    <div id="analysis"></div>
    <h3>Samples</h3><div class="samples" id="samples"><div class="empty">No samples yet.</div></div>
    <h3>Checkpoints</h3><div id="checkpoints"><div class="empty">No checkpoints yet.</div></div>
    <h3>Log</h3><pre class="log" id="log"></pre>`;
  const existing = await api(`/api/jobs/${id}/analysis`);
  if (existing.analysis) $('#analysis').innerHTML = `<h3>Gemini analysis</h3><pre class="analysis">${existing.analysis}</pre>`;
  const poll = () => { drawMetrics(id); loadSamples(id); loadCheckpoints(id); loadLog(id); };
  poll(); pollTimer = setInterval(poll, 4000);
}

async function analyzeJob(id){
  toast('Sending curve + samples to Gemini…');
  try{
    const res = await post(`/api/jobs/${id}/analyze`);
    $('#analysis').innerHTML = `<h3>Gemini analysis (${res.model}, ${res.samples_attached} samples)</h3><pre class="analysis">${res.analysis}</pre>`;
  }catch(e){ toast(e.message); }
}

async function stopJob(id){
  if(!confirm('Stop this training run?')) return;
  try{ await post(`/api/jobs/${id}/stop`); toast('Job stopped.'); }catch(e){ toast(e.message); }
}
async function deleteJob(id){
  if(!confirm('Delete this job and all its checkpoints?')) return;
  try{ await api(`/api/jobs/${id}`, {method:'DELETE'}); toast('Job deleted.'); showTrain(); }catch(e){ toast(e.message); }
}

function ema(values, alpha=0.06){ const out=[]; let prev=values[0]; for(const v of values){ prev=alpha*v+(1-alpha)*prev; out.push(prev);} return out; }

async function drawMetrics(id){
  const data = await api(`/api/jobs/${id}/metrics`);
  const st = $('#jobstatus'); if(st){ st.textContent=data.status; st.className='st '+data.status; }
  const pts = data.points, canvas = $('#chart'); if(!canvas || !pts.length) return;
  const dpr = devicePixelRatio||1, W = canvas.clientWidth, H = 250;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const loss = pts.map(p=>p.loss), steps = pts.map(p=>p.step), smooth = ema(loss);
  const pad = {l:46,r:10,t:12,b:22};
  const sorted = [...loss].sort((a,b)=>a-b);
  const lo = sorted[0], hi = sorted[Math.floor(sorted.length*0.98)] ?? sorted.at(-1);
  const x = i => pad.l + (W-pad.l-pad.r)*(i/(pts.length-1||1));
  const y = v => pad.t + (H-pad.t-pad.b)*(1-Math.min(1,Math.max(0,(v-lo)/((hi-lo)||1))));
  const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  ctx.strokeStyle = css('--line'); ctx.fillStyle = css('--muted'); ctx.font='11px '+css('--mono'); ctx.lineWidth=1;
  for(let g=0; g<=4; g++){
    const gy = pad.t+(H-pad.t-pad.b)*g/4;
    ctx.beginPath(); ctx.moveTo(pad.l,gy); ctx.lineTo(W-pad.r,gy); ctx.stroke();
    ctx.fillText((hi-(hi-lo)*g/4).toFixed(3), 4, gy+3);
  }
  ctx.fillText(String(steps[0]), pad.l, H-6); ctx.fillText(String(steps.at(-1)), W-pad.r-36, H-6);
  ctx.strokeStyle = css('--muted'); ctx.globalAlpha = 0.35; ctx.beginPath();
  loss.forEach((v,i)=> i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))); ctx.stroke(); ctx.globalAlpha = 1;
  ctx.lineWidth=2; ctx.strokeStyle = css('--accent'); ctx.beginPath();
  smooth.forEach((v,i)=> i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))); ctx.stroke();
  const last = pts.at(-1);
  $('#statline').innerHTML = `step <b>${last.step}</b> · loss <b>${last.loss.toFixed(4)}</b> · ema <b>${smooth.at(-1).toFixed(4)}</b> · lr <b>${Number(last.lr).toExponential(1)}</b> · epoch <b>${last.epoch}</b>`;
}

async function loadSamples(id){
  const groups = await api(`/api/jobs/${id}/samples`);
  if(!groups.length) return;
  $('#samples').innerHTML = groups.slice().reverse().map(g=>`
    <div><div class="steptitle">${g.step}</div><div class="thumbs">
      ${g.images.map(img=>{
        const src = `/api/jobs/${id}/samples/${g.step}/${img}?t=${encodeURIComponent(TOKEN)}`;
        return `<img loading="lazy" src="${src}" alt="${img}" title="${img}" onclick="lightbox('${src}')">`;
      }).join('')}</div></div>`).join('');
}

function lightbox(src){ $('#lightimg').src = src; $('#lightbox').style.display='flex'; }

async function loadCheckpoints(id){
  const cps = await api(`/api/jobs/${id}/checkpoints`);
  if(!cps.length) return;
  $('#checkpoints').innerHTML = `<div class="card" style="padding:0"><table>
    <tr><th>Checkpoint</th><th>Size</th><th></th></tr>
    ${cps.map(c=>`<tr><td>${c.step}</td><td>${c.size_mb} MB</td>
      <td><a href="/api/jobs/${id}/checkpoints/${c.step}/download?t=${encodeURIComponent(TOKEN)}">download</a></td></tr>`).join('')}
  </table></div>`;
}

async function loadLog(id){
  const data = await api(`/api/jobs/${id}/log`);
  const el = $('#log'); if(!el) return;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  el.textContent = data.lines.join('\n');
  if(atBottom) el.scrollTop = el.scrollHeight;
}

/* ---------------- settings ---------------- */
async function showSettings(){
  currentJob = null; stopPolling(); setNav('#nav-settings'); refreshJobs();
  const s = await api('/api/settings');
  $('#main').innerHTML = `
  <h2>Settings</h2>
  <div class="card">
    <div class="row"><label>Hugging Face token</label>
      <input id="s_hf" type="password" placeholder="${s.hf_token_set?'saved — enter new value to replace':'hf_…'}"></div>
    <div class="row"><label>Gemini API key</label>
      <input id="s_gem" type="password" placeholder="${s.gemini_key_set?'saved — enter new value to replace':'AI Studio key for captioner + analysis'}"></div>
    <div class="row"><label>Default Gemini model</label>
      <div style="display:flex;gap:8px"><select id="s_gemmodel" style="flex:1"><option value="${s.gemini_model}">${s.gemini_model||'— save a key, then fetch —'}</option></select>
      <button class="small" type="button" onclick="fetchSettingsModels()">↻ Fetch models</button></div></div>
    <div style="margin-top:12px"><button class="primary" onclick="saveSettings()">Save settings</button></div>
    <p class="hint" style="margin-top:10px">Keys are stored in /workspace/.day0/settings.json on this pod's volume — they never leave the pod except toward Hugging Face and Google.</p>
  </div>`;
}
async function fetchSettingsModels(){
  if ($('#s_gem').value.trim()) await put('/api/settings', {gemini_api_key: $('#s_gem').value.trim()});
  try{
    const models = await api('/api/gemini/models');
    const current = (await api('/api/settings')).gemini_model;
    $('#s_gemmodel').innerHTML = models.map(m=>`<option value="${m.id}" ${m.id===current?'selected':''}>${m.label}</option>`).join('');
  }catch(e){ toast(e.message); }
}
async function saveSettings(){
  await put('/api/settings', {
    hf_token: $('#s_hf').value.trim() || undefined,
    gemini_api_key: $('#s_gem').value.trim() || undefined,
    gemini_model: $('#s_gemmodel').value || undefined,
  });
  toast('Settings saved.');
}

async function selfUpdate(){
  if(!confirm('Pull latest code and restart the UI? (Not possible while a job is running.)')) return;
  try{ await post('/api/update'); }catch(e){ toast(e.message); return; }
  toast('Updating… reconnecting shortly.');
  setTimeout(()=>location.reload(), 8000);
}

refreshJobs(); showTrain(); setInterval(refreshJobs, 8000);
</script>
